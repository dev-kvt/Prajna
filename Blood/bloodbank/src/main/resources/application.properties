spring.application.name=bloodbank

# External API settings
# Adjust these to control how long we wait before giving up
external.api.base-url=https://bloodbank-proxy.dvnsh-work.workers.dev/
external.api.connect-timeout=5s
external.api.read-timeout=15s
# Optional retry and headers
external.api.retry.max-attempts=2
external.api.retry.backoff=300ms
external.api.user-agent=BloodBankWrapper/1.0

# Optional cache for external API responses (Caffeine)
# Adjust TTL/size as needed; remove these if you don't want caching
spring.cache.type=caffeine
spring.cache.cache-names=bloodAvailability
spring.cache.caffeine.spec=expireAfterWrite=60s,maximumSize=1000
